<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#131313">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>shhh .ᐟ</title>
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
</head>
<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;   
        background-color: #131313;
        font-family: 'JetBrains Mono', monospace;
        text-align: center;
    }
    .profile-pic {
        margin-bottom: 20px;
        width: 150px;
        height: 150px;
        border-radius: 50%;
        overflow: hidden;         
        border: 3px solid #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #f0f0f0;
    }
    .profile-pic img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    .bio {
        margin-top: 20px;
        max-width: 700px;
        font-size: 1.0em;
        color: #d1d1d1;
        line-height: 1.6;
    }
    a {
        color: white;
        text-decoration: none;
    }

    a:hover {
        opacity: 0.7;
    }
    .music-player {
        position: fixed;
        bottom: 20px;
        left: 20px;

        background: rgba(0,0,0,0.6);
        border: 1px solid #ffffff22;
        padding: 10px 14px;
        border-radius: 12px;

        font-family: monospace;
        color: white;

        backdrop-filter: blur(8px);
    }
    .music-player button {
        background: none;
        border: 1px solid #ffffff33;
        color: white;
        margin: 3px;
        padding: 4px 8px;
        cursor: pointer;
    }
    .music-player button:hover {
        opacity: 0.7;
    }
    .music-player.playing {
        border-color: #383838;
        box-shadow: 0 0 10px rgba(233, 233, 233, 0.2);
    }
    .controls {
        margin-top: 8px;
    }
    .volume-container {
        margin-top: 10px;
        display: flex;
        align-items: center;
        gap: 8px;

        font-size: 12px;
    }
    .volume-container input {
        width: 100%;
        cursor: pointer;
    }
    .profile-pic {
        cursor: pointer;
        transition: 0.25s ease;
    }
    .profile-pic:hover {
        transform: scale(1.05);
        box-shadow: 0 0 20px rgba(255,255,255,0.2);
    }
</style>
<body>
<video width="1080" height="640" controls loop autofocus>
    <source src="video/gyat.mp4" type="video/mp4">
</video>
</body>
</html>
